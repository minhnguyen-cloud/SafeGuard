<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SafeGuard Offline</title>
    <meta name="theme-color" content="#003366">
    <style>
        :root {
            --brand: #003366;
            --accent: #ff9f1c;
            --danger: #e63946;
            --paper: #ffffff;
            --bg: linear-gradient(135deg, #f4f7f6 0%, #e9f2ff 100%);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: "Segoe UI", Arial, sans-serif;
            background: var(--bg);
            color: #1f2937;
        }

        .card {
            width: min(100%, 560px);
            background: var(--paper);
            border-radius: 24px;
            padding: 32px 28px;
            box-shadow: 0 18px 40px rgba(0, 51, 102, 0.16);
            border: 1px solid rgba(0, 51, 102, 0.08);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(230, 57, 70, 0.08);
            color: var(--danger);
            font-weight: 700;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            font-size: 12px;
        }

        h1 {
            margin: 18px 0 12px;
            color: var(--brand);
            font-size: clamp(28px, 5vw, 40px);
            line-height: 1.15;
        }

        p {
            margin: 0 0 12px;
            font-size: 16px;
            line-height: 1.7;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 24px;
        }

        .button {
            text-decoration: none;
            border: none;
            cursor: pointer;
            border-radius: 999px;
            padding: 12px 18px;
            font-size: 15px;
            font-weight: 700;
        }

        .button-primary {
            background: var(--brand);
            color: #ffffff;
        }

        .button-secondary {
            background: #fff4e5;
            color: #8a4b00;
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="badge">SafeGuard PWA</div>
        <h1>Ban dang offline</h1>
        <p>SafeGuard tam thoi khong ket noi duoc Internet. Cac du lieu canh bao thoi gian thuc se can mang de dong bo.</p>
        <p>Ban co the thu tai lai trang khi mang on dinh tro lai.</p>
        <div class="actions">
            <button class="button button-primary" type="button" onclick="window.location.reload()">Thu tai lai</button>
            <a class="button button-secondary" href="/">Ve trang chu</a>
        </div>
    </main>
</body>
</html>
