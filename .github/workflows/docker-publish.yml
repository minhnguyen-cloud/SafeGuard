name: Docker Publish SafeGuard

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  docker-build-and-push:
    runs-on: self-hosted

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Show current directory
        shell: powershell
        run: |
          Write-Host "GITHUB_WORKSPACE = $env:GITHUB_WORKSPACE"
          Get-Location
          Get-ChildItem
          Get-ChildItem .\SafeGuard

      - name: Show Docker version
        shell: powershell
        run: docker version

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        shell: powershell
        run: nuget restore "$env:GITHUB_WORKSPACE\SafeGuard\SafeGuard.sln"

      - name: Publish ASP.NET web project
        shell: powershell
        run: |
          $publishPath = "$env:GITHUB_WORKSPACE\Publish"
          Write-Host "Publish path = $publishPath"

          if (Test-Path $publishPath) {
            Remove-Item -Recurse -Force $publishPath
          }

          msbuild "$env:GITHUB_WORKSPACE\SafeGuard\SafeGuard.csproj" `
            /p:Configuration=Release `
            /p:DeployOnBuild=true `
            /p:WebPublishMethod=FileSystem `
            /p:PublishUrl="$publishPath" `
            /p:DeleteExistingFiles=True

      - name: Show published files
        shell: powershell
        run: |
          $publishPath = "$env:GITHUB_WORKSPACE\Publish"
          Write-Host "Checking publish path: $publishPath"
          Test-Path $publishPath
          Get-ChildItem $publishPath

      - name: Docker login
        shell: powershell
        run: docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" -p "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: Build Docker image
        shell: powershell
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/safeguard-web:latest -t ${{ secrets.DOCKERHUB_USERNAME }}/safeguard-web:${{ github.run_number }} .

      - name: Push latest tag
        shell: powershell
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/safeguard-web:latest

      - name: Push numbered tag
        shell: powershell
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/safeguard-web:${{ github.run_number }}
