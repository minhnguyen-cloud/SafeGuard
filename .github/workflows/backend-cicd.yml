name: SafeGuard Backend CI/CD

# 1. Kích hoạt tự động khi Push code lên nhánh Backend
on:
  push:
    branches: [ "Backend" ]
  pull_request:
    branches: [ "Backend" ]

jobs:
  build:
    runs-on: windows-latest 

    steps:
    # ĐÃ NÂNG CẤP LÊN v4
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1.1.0

    - name: Restore NuGet Packages
      run: nuget restore SafeGuard.sln

    - name: Build and Package ASP.NET MVC
      run: msbuild SafeGuard.sln /p:Configuration=Release /p:DeployOnBuild=true /p:WebPublishMethod=Package /p:PackageAsSingleFile=true /p:PackageLocation="$(build.artifactstagingdirectory)\\"

    # ĐÃ NÂNG CẤP LÊN v4
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SafeGuard-Backend-Release
        path: ${{ github.workspace }}\**\*.zip
